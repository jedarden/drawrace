# Docker Compose for running Layer 3 snapshot tests locally
# Usage: docker-compose -f docker-compose.snapshot.yml run --rm snapshot-test
services:
  snapshot-test:
    image: drawrace/ci-snap:local
    volumes:
      - .:/work
    working_dir: /work
    environment:
      - SNAPSHOT_UPDATE=${SNAPSHOT_UPDATE:-}
      - CI=true
    command: sh -c "pnpm install && pnpm exec playwright install --with-deps chromium && pnpm test:snapshot"
    # Keep container running for debugging (uncomment to use)
    # tty: true
    # stdin_open: true
    # command: /bin/bash
