apiVersion: v1
kind: ConfigMap
metadata:
  name: drawrace-client-key
  namespace: drawrace
data:
  # HMAC key for client submissions - rotate via sealed-secrets
  current: "placeholder-replace-with-sealed-secret"
  previous: ""
  rotated_at: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: drawrace-api-secrets
  namespace: drawrace
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@postgres:5432/drawrace"
  REDIS_URL: "redis://redis:6379"
  S3_BUCKET: "drawrace-ghosts"
  # AWS credentials via environment or IRSA
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawrace-api
  namespace: drawrace
  labels:
    app: drawrace-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drawrace-api
  template:
    metadata:
      labels:
        app: drawrace-api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: drawrace-api
      containers:
        - name: api
          image: ronaldraygun/drawrace-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drawrace-api-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: drawrace-api-secrets
                  key: REDIS_URL
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: drawrace-api-secrets
                  key: S3_BUCKET
            - name: HMAC_CURRENT_KEY
              valueFrom:
                configMapKeyRef:
                  name: drawrace-client-key
                  key: current
            - name: HMAC_PREVIOUS_KEY
              valueFrom:
                configMapKeyRef:
                  name: drawrace-client-key
                  key: previous
            - name: HMAC_ROTATED_AT
              valueFrom:
                configMapKeyRef:
                  name: drawrace-client-key
                  key: rotated_at
            - name: RUST_LOG
              value: info,tower_http=debug
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: drawrace-api
  namespace: drawrace
  labels:
    app: drawrace-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: drawrace-api
---
apiVersion: v1
kind: Service
metadata:
  name: drawrace-validator
  namespace: drawrace
  labels:
    app: drawrace-validator
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: internal
      protocol: TCP
      name: internal
    - port: 8081
      targetPort: healthz
      protocol: TCP
      name: healthz
  selector:
    app: drawrace-validator
