apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: drawrace-build
  namespace: argo-workflows
  labels:
    app: drawrace-build
spec:
  entrypoint: build
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: repo
        value: jedarden/drawrace
      - name: branch
        value: main
      - name: tag
        value: ""
  volumes:
    - name: docker-config
      secret:
        secretName: docker-hub-registry
        items:
          - key: .dockerconfigjson
            path: config.json
  templates:
    - name: build
      dag:
        tasks:
          - name: checkout
            template: git-checkout
          - name: lint-api
            template: cargo-lint
            dependencies: [checkout]
            arguments:
              parameters:
                - name: crate
                  value: api
          - name: lint-validator
            template: cargo-lint
            dependencies: [checkout]
            arguments:
              parameters:
                - name: crate
                  value: validator
          - name: test-api
            template: cargo-test
            dependencies: [checkout]
            arguments:
              parameters:
                - name: crate
                  value: api
          - name: test-validator
            template: cargo-test
            dependencies: [checkout]
            arguments:
              parameters:
                - name: crate
                  value: validator
          - name: build-api
            template: docker-build
            dependencies: [lint-api, test-api]
            arguments:
              parameters:
                - name: binary
                  value: drawrace-api
                - name: image
                  value: ronaldraygun/drawrace-api
          - name: build-validator
            template: docker-build
            dependencies: [lint-validator, test-validator]
            arguments:
              parameters:
                - name: binary
                  value: drawrace-validator
                - name: image
                  value: ronaldraygun/drawrace-validator

    - name: git-checkout
      activeDeadlineSeconds: 300
      container:
        image: alpine/git:2.43.0
        command: [sh, -c]
        args:
          - |
            set -e
            git clone --depth 1 --branch "{{workflow.parameters.branch}}" \
              "https://x-access-token:${GH_TOKEN}@github.com/{{workflow.parameters.repo}}.git" \
              /workspace
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumeClaimTemplates:
        - metadata:
            name: workspace
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 4Gi

    - name: cargo-lint
      inputs:
        parameters:
          - name: crate
      activeDeadlineSeconds: 600
      container:
        image: rust:1.85-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null 2>&1
            cd /workspace/crates/{{inputs.parameters.crate}}
            cargo fmt --all -- --check
            cargo clippy --all-targets -- -D warnings
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

    - name: cargo-test
      inputs:
        parameters:
          - name: crate
      activeDeadlineSeconds: 600
      container:
        image: rust:1.85-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null 2>&1
            cd /workspace
            export CARGO_TARGET_DIR=/workspace/target-test
            cargo test -p drawrace-{{inputs.parameters.crate}}
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

    - name: docker-build
      inputs:
        parameters:
          - name: binary
          - name: image
      retryStrategy:
        limit: "2"
        retryPolicy: OnError
        backoff:
          duration: 30s
          factor: "2"
      activeDeadlineSeconds: 1800
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --context=git://github.com/{{workflow.parameters.repo}}.git#refs/heads/{{workflow.parameters.branch}}
          - --dockerfile=Dockerfile.{{inputs.parameters.binary}}
          - --destination={{inputs.parameters.image}}:latest
          - --cache=true
          - --cache-repo=ronaldraygun/cache
          - --snapshot-mode=redo
          - --use-new-run=true
        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 4Gi
