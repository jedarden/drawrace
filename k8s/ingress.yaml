---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: drawrace-api-cert
  namespace: drawrace
spec:
  secretName: drawrace-api-tls
  duration: 2160h0m0s # 90d
  renewBefore: 360h0m0s # 15d
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "api.drawrace.ardenone.com"
  dnsNames:
  - "api.drawrace.ardenone.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: drawrace-api-ingressroute
  namespace: drawrace
  annotations:
    external-dns.alpha.kubernetes.io/hostname: api.drawrace.ardenone.com
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`api.drawrace.ardenone.com`)
    kind: Rule
    services:
    - name: drawrace-api
      port: 80
  tls:
    secretName: drawrace-api-tls
