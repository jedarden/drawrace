---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drawrace-api
  namespace: drawrace
  labels:
    app: drawrace-api
spec:
  selector:
    matchLabels:
      app: drawrace-api
  endpoints:
    - port: http
      path: /v1/metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drawrace-live
  namespace: drawrace
  labels:
    app: drawrace-live
spec:
  selector:
    matchLabels:
      app: drawrace-live
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: drawrace-alerts
  namespace: drawrace
  labels:
    app: drawrace
spec:
  groups:
    - name: drawrace-beta
      rules:
        - alert: DrawRaceHighRejectionRate
          expr: |
            rate(drawrace_submissions_total{outcome="rejected"}[10m])
            / rate(drawrace_submissions_total[10m]) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace submission rejection rate above 10%"
            description: >
              {{ $value | printf "%.1f" }}% of submissions are being rejected
              over the last 10 minutes. Check validator logs and physics version alignment.

        - alert: DrawRaceValidatorQueueBacklog
          expr: drawrace_validator_queue_depth > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace validator queue depth above 100"
            description: >
              Validator queue has {{ $value }} pending jobs for over 5 minutes.
              Consider scaling up validator replicas.

        - alert: DrawRaceApiUnavailable
          expr: kube_deployment_status_replicas_available{deployment="drawrace-api"} < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DrawRace API has no available replicas"
            description: >
              drawrace-api deployment has 0 available replicas for over 2 minutes.
              Check pod events and logs.

        - alert: DrawRacePostgresConnectionFailures
          expr: |
            rate(drawrace_postgres_connection_errors_total[5m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DrawRace Postgres connection failures"
            description: >
              API is failing to connect to Postgres. Check CloudNativePG cluster status.

        - alert: DrawRaceReplayMismatchSpike
          expr: |
            rate(drawrace_submissions_total{outcome="rejected",reason="replay_mismatch"}[10m])
            / rate(drawrace_submissions_total[10m]) > 0.005
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace replay mismatch rate above 0.5%"
            description: >
              Replay verification mismatch rate is {{ $value | printf "%.3f" }}.
              This may indicate physics version drift between client and server.

        - alert: DrawRaceLiveServiceUnavailable
          expr: kube_deployment_status_replicas_available{deployment="drawrace-live"} < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DrawRace Live service has no available replicas"
            description: >
              drawrace-live deployment has 0 available replicas for over 2 minutes.
              Live multiplayer is unavailable. Check pod events and logs.

        - alert: DrawRaceLiveHighLobbySize
          expr: drawrace_lobby_size > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace live lobby size above 100"
            description: >
              Lobby has {{ $value }} players waiting for over 5 minutes.
              Consider scaling up drawrace-live replicas.

        - alert: DrawRaceLiveHighActiveRooms
          expr: drawrace_rooms_active > 500
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace live has over 500 active rooms"
            description: >
              {{ $value }} rooms are currently active. Monitor performance.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drawrace-validator
  namespace: drawrace
  labels:
    app: drawrace-validator
spec:
  selector:
    matchLabels:
      app: drawrace-validator
  endpoints:
    - port: internal
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: drawrace-validator-alerts
  namespace: drawrace
  labels:
    app: drawrace-validator
spec:
  groups:
    - name: replay-mismatch
      rules:
        - alert: DrawRaceReplayMismatchHigh
          expr: |
            sum(rate(drawrace_validator_resim_mismatch_total[1h]))
            / sum(rate(drawrace_validator_submissions_total[1h])) > 0.01
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace replay mismatch rate above 1%"
            description: >
              Physics re-simulation mismatch rate is {{ $value | printf "%.3f" }}%
              over the last hour. This may indicate physics drift between
              client and server versions.

        - alert: DrawRaceReplayMismatchCritical
          expr: |
            sum(rate(drawrace_validator_resim_mismatch_total[5m]))
            / sum(rate(drawrace_validator_submissions_total[5m])) > 0.02
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DrawRace replay mismatch rate CRITICAL (>2%)"
            description: >
              Physics re-simulation mismatch rate is {{ $value | printf "%.3f" }}%
              over the last 5 minutes. This indicates serious physics drift
              or a server-side bug. Investigate immediately.

        - alert: DrawRaceHighRejectionRate
          expr: |
            sum(rate(drawrace_validator_rejected_total[1h]))
            / sum(rate(drawrace_validator_submissions_total[1h])) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace rejection rate above 5%"
            description: >
              Overall rejection rate is {{ $value | printf "%.1f" }}%
              over the last hour. Check validator logs and rejection reasons.

        - alert: DrawRaceQuarantineSpike
          expr: |
            sum(rate(drawrace_validator_quarantined_total[1h]))
            / sum(rate(drawrace_validator_submissions_total[1h])) > 0.001
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "DrawRace quarantine rate elevated (>0.1%)"
            description: >
              Champion quarantine rate is {{ $value | printf "%.3f" }}%
              over the last hour. This may indicate new physics exploits
              or outdated champion reference times.
