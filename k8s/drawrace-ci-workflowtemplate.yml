apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: drawrace-ci
  namespace: argo-workflows
  labels:
    app: drawrace-ci
spec:
  # ── Top-level parameters ────────────────────────────────────────────────────
  arguments:
    parameters:
      - name: ref
        value: main
      - name: mode
        # pr | nightly | release
        value: pr
      - name: preview-url
        # Injected by drawrace-build's trigger-ci step after Pages publish.
        # Empty on manual/local runs; phone-smoke step is skipped when empty.
        value: ""

  entrypoint: ci

  templates:
    # ── CI DAG ─────────────────────────────────────────────────────────────────
    - name: ci
      dag:
        tasks:
          - name: lint
            template: step
            arguments:
              parameters:
                - {name: cmd, value: "pnpm lint"}

          - name: unit
            template: step
            dependencies: [lint]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm vitest run --coverage"}

          - name: physics-golden
            template: step
            dependencies: [unit]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm -F engine-core test:golden"}

          - name: replay-verify
            template: step
            dependencies: [unit]
            arguments:
              parameters:
                - {name: cmd, value: "cargo test -p drawrace-validator --test replay"}

          - name: build
            template: step
            dependencies: [physics-golden]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm build"}

          - name: render-snap
            template: snap-step
            dependencies: [build]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm test:snapshot"}

          - name: e2e
            template: step
            dependencies: [build]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm test:e2e"}

          - name: backend-contract
            template: step
            dependencies: [build]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm test:contract"}

          - name: perf
            template: step
            dependencies: [build]
            arguments:
              parameters:
                - {name: cmd, value: "pnpm test:perf"}

          # phone-smoke: serialized via mutex, runs only when a preview URL is available
          - name: phone-smoke
            template: phone-smoke
            dependencies: [build]
            when: "'{{workflow.parameters.preview-url}}' != ''"
            arguments:
              parameters:
                - name: preview-url
                  value: "{{workflow.parameters.preview-url}}"

          - name: load
            template: step
            dependencies: [e2e]
            when: "'{{workflow.parameters.mode}}' == 'nightly'"
            arguments:
              parameters:
                - {name: cmd, value: "k6 run load/submit.js"}

          - name: device-matrix
            template: device-matrix
            dependencies: [e2e]
            when: "'{{workflow.parameters.mode}}' == 'release'"
            arguments:
              parameters:
                - name: preview-url
                  value: "{{workflow.parameters.preview-url}}"

          # ── Metrics collection (runs after all CI steps) ───────────────────
          - name: push-metrics
            template: push-metrics
            dependencies: [unit, physics-golden, perf, render-snap, e2e, backend-contract]
            arguments:
              parameters:
                - name: job
                  value: "drawrace-ci"
                - name: instance
                  value: "{{workflow.uid}}"
                - name: mode
                  value: "{{workflow.parameters.mode}}"

    # ── Generic step template ───────────────────────────────────────────────
    - name: step
      inputs:
        parameters:
          - name: cmd
      activeDeadlineSeconds: 600
      container:
        image: ghcr.io/drawrace/ci-snap:2026-04-21
        command: [bash, -lc, "{{inputs.parameters.cmd}}"]
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}

    # ── Snapshot step template (pinned image for deterministic rendering) ───
    - name: snap-step
      inputs:
        parameters:
          - name: cmd
      activeDeadlineSeconds: 600
      container:
        image: ghcr.io/drawrace/ci-snap:2026-04-24
        command: [bash, -lc, "{{inputs.parameters.cmd}}"]
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}

    # ── Metrics push template ─────────────────────────────────────────────────
    # Collects all CI metrics and pushes them to Prometheus pushgateway.
    # See plan.md §Testing 14 for metric definitions.
    - name: push-metrics
      inputs:
        parameters:
          - name: job
          - name: instance
          - name: mode
      activeDeadlineSeconds: 120
      container:
        image: ghcr.io/drawrace/ci-snap:2026-04-24
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            # Set environment variables for metrics collection
            export CI_RUN_ID="{{inputs.parameters.instance}}"
            export CI_MODE="{{inputs.parameters.mode}}"
            export CI_BRANCH="{{workflow.parameters.ref}}"
            export PUSHGATEWAY_URL="http://prometheus-pushgateway.argo-workflows:9091"
            # Collect and push metrics
            node scripts/push-metrics.ts --job="{{inputs.parameters.job}}" --instance="{{inputs.parameters.instance}}"
        env:
          - name: CI
            value: "true"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}

    # ── Phone-smoke template ────────────────────────────────────────────────
    # Serialized via mutex so concurrent PRs queue rather than fight over the
    # single Pixel 6.  ADB_SERVER_SOCKET points at the adb-relay service which
    # bridges the CI pod to the persistent ADB server on the coding host.
    - name: phone-smoke
      inputs:
        parameters:
          - name: preview-url
      activeDeadlineSeconds: 300
      # Serialize access to the Pixel 6 — concurrent PRs queue behind this mutex
      synchronization:
        mutex:
          name: drawrace-phone
      container:
        image: ghcr.io/drawrace/ci-phone:2026-04-21
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            # Verify ADB is reachable before spending time on the run
            adb-check
            # Run the smoke against the provided preview URL
            # --skip-build: dist is already published to Cloudflare Pages
            PHONE_SMOKE_URL="{{inputs.parameters.preview-url}}" \
              bash e2e/phone-smoke/run.sh --skip-build
        env:
          - name: ADB_SERVER_SOCKET
            value: "tcp:adb-relay.tailnet:5037"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      # Upload screenshots on failure so engineers can see what the phone saw
      outputs:
        artifacts:
          - name: phone-smoke-screenshots
            path: /workspace/e2e/phone-smoke/artifacts
            archive:
              tar: {}
            # s3 destination configured by the Argo controller's artifact repo

    # ── Device-matrix template ─────────────────────────────────────────────────
    # BrowserStack App Automate integration for release-candidate gating.
    # Runs on real devices: iPhone 12/15 Pro Safari, Pixel 6 cross-check, Redmi 9
    # low-end, Galaxy S23 Samsung Internet. See plan.md §Testing 10.2.
    - name: device-matrix
      inputs:
        parameters:
          - name: preview-url
      activeDeadlineSeconds: 900
      container:
        image: ghcr.io/drawrace/ci-snap:2026-04-24
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            # Install BrowserStack Playwright integration
            pnpm install
            # Run device matrix against the preview URL
            # Failure on 2+ devices blocks release
            DRAWRACE_TEST_URL="{{inputs.parameters.preview-url}}" \
              pnpm test:devices
        env:
          # BrowserStack credentials injected from sealed-secret
          - name: BROWSERSTACK_USERNAME
            valueFrom:
              secretKeyRef:
                name: drawrace-browserstack
                key: username
          - name: BROWSERSTACK_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: drawrace-browserstack
                key: access-key
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
      # Upload test results and screenshots on failure
      outputs:
        artifacts:
          - name: device-matrix-results
            path: /workspace/playwright-report
            archive:
              tar: {}
          - name: device-matrix-screenshots
            path: /workspace/test-results
            archive:
              tar: {}
