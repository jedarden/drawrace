---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawrace-live
  namespace: drawrace
  labels:
    app: drawrace-live
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drawrace-live
  template:
    metadata:
      labels:
        app: drawrace-live
    spec:
      imagePullSecrets:
        - name: docker-hub-registry
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: drawrace-live
      subdomain: drawrace-live
      containers:
        - name: live
          image: ronaldraygun/drawrace-live:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: drawrace-api-secrets
                  key: REDIS_URL
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RUST_LOG
              value: info,tower_http=debug
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: drawrace-live
  namespace: drawrace
  labels:
    app: drawrace-live
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: drawrace-live
---
apiVersion: v1
kind: Service
metadata:
  name: drawrace-live-headless
  namespace: drawrace
  labels:
    app: drawrace-live
  annotations:
    # Enable session affinity for WebSocket connections
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: drawrace-live
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
