apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-deny-ingress
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-validator
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-allow-api
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-allow-live
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-live
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-allow-internal
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-validator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: drawrace-api
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-allow-validator-healthz
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-validator
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drawrace-allow-validator-metrics
  namespace: drawrace
spec:
  podSelector:
    matchLabels:
      app: drawrace-validator
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus to scrape metrics from port 8080
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080
