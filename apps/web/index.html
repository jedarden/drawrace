<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F4EAD5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DrawRace">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>DrawRace</title>
  <meta name="description" content="Draw a wheel. Race the ghosts. A mobile-first racing PWA where your drawing becomes the wheel.">
  <meta property="og:title" content="DrawRace">
  <meta property="og:description" content="Draw a wheel. Race the ghosts. A mobile-first racing PWA where your drawing becomes the wheel.">
  <meta property="og:image" content="/icon-512.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <!-- Preload self-hosted webfonts -->
  <link rel="preload" href="/fonts/caveat-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/patrick-hand-sc-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      background-color: #F4EAD5;
      font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive, system-ui, sans-serif;
    }
    /* WCAG AA focus indicators */
    :focus-visible {
      outline: 3px solid #2B2118;
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
    /* Ensure touch targets meet 44x44 minimum */
    button, [role="switch"], input[type="text"], textarea {
      min-height: 44px;
    }
    /* Reduced motion: disable transitions */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
