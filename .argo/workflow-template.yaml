apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: drawrace-ci
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: "DrawRace CI - builds API, validator, and publishes to Cloudflare Pages"
spec:
  entrypoint: drawrace-ci
  arguments:
    parameters:
      - name: branch
        value: main
      - name: repo
        value: https://github.com/jedarden/drawrace
      - name: republish_only
        value: "false"
  workflowMetadata:
    labels:
      app: drawrace
  templates:
    - name: drawrace-ci
      inputs: {}
      outputs: {}
      steps:
        - - name: checkout
            template: checkout
        - - name: rotate-client-key
            template: rotate-client-key
            when: "'{{workflow.parameters.branch}}' == 'main' && '{{workflow.parameters.republish_only}}' != 'true'"
        - - name: perf-budget
            template: perf-budget
            arguments:
              artifacts:
                - name: src
                  from: "{{steps.checkout.outputs.artifacts.src}}"
        - - name: replay-verify
            template: replay-verify
            arguments:
              artifacts:
                - name: src
                  from: "{{steps.checkout.outputs.artifacts.src}}"
        - - name: buildx-api
            template: docker-buildx
            arguments:
              parameters:
                - name: image
                  value: ronaldraygun/drawrace-api
                - name: dockerfile
                  value: Dockerfile.api
                - name: version-path
                  value: crates/api/Cargo.toml
          - name: buildx-validator
            template: docker-buildx
            arguments:
              parameters:
                - name: image
                  value: ronaldraygun/drawrace-validator
                - name: dockerfile
                  value: Dockerfile.validator
                - name: version-path
                  value: crates/validator/Cargo.toml
        - - name: bump-manifest
            template: update-declarative-config
            arguments:
              parameters:
                - name: images
                  value: |
                    ronaldraygun/drawrace-api:{{steps.buildx-api.outputs.parameters.image-tag}}
                    ronaldraygun/drawrace-validator:{{steps.buildx-validator.outputs.parameters.image-tag}}
        - - name: wait-validator-live
            template: wait-validator-live
            arguments:
              parameters:
                - name: health-url
                  value: https://api-drawrace.ardenone.com/v1/health
        - - name: pages-publish
            template: wrangler-pages
            arguments:
              parameters:
                - name: project
                  value: drawrace
              artifacts:
                - name: src
                  from: "{{steps.checkout.outputs.artifacts.src}}"

    - name: checkout
      inputs:
        artifacts:
          - name: repo
            path: /src
            git:
              repo: "{{workflow.parameters.repo}}"
              revision: "{{workflow.parameters.branch}}"
              depth: 1
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            git log -1 --pretty=%H > /tmp/git-sha
            git rev-parse --short HEAD > /tmp/git-short-sha
        volumeMounts:
          - name: out
            mountPath: /tmp
      outputs:
        artifacts:
          - name: src
            from: "{{inputs.artifacts.repo.path}}"
        parameters:
          - name: git-sha
            valueFrom:
              path: /tmp/git-sha
          - name: git-short-sha
            valueFrom:
              path: /tmp/git-short-sha

    - name: rotate-client-key
      container:
        image: alpine:3.19
        command: [sh, -lc]
        args:
          - |
            #!/bin/sh
            set -euo pipefail
            apk add --no-cache kubectl openssl
            OLD=$(kubectl -n drawrace get configmap drawrace-client-key -o jsonpath='{.data.current}')
            NEW=$(openssl rand -hex 16)
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            kubectl -n drawrace apply -f - <<EOF
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: drawrace-client-key
              namespace: drawrace
            data:
              current: "$NEW"
              previous: "$OLD"
              rotated_at: "$NOW"
            EOF
        env:
          - name: KUBECONFIG
            value: /workspace/kubeconfig/config
        volumeMounts:
          - name: kubeconfig
            mountPath: /workspace/kubeconfig
            readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: drawrace-apexalgo-iad-kubeconfig
            optional: true
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "500m"

    - name: replay-verify
      inputs:
        artifacts:
          - name: src
            path: /src
      container:
        image: rust:1.83-bookworm
        command: [sh, -c]
        args:
          - |
            set -ex
            cd /src
            # Install dependencies for WASM build
            apt-get update -qq && apt-get install -y -qq wabt
            # Install pnpm and build the validator WASM first
            npm install -g pnpm@10
            pnpm install
            pnpm --filter @drawrace/engine-core build
            # Run replay verification tests
            cargo test -p drawrace-validator --test replay -- --nocapture
        env:
          - name: CARGO_TERM_COLOR
            value: always
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

    - name: perf-budget
      inputs:
        artifacts:
          - name: src
            path: /src
      container:
        image: node:20-alpine
        command: [sh, -c]
        args:
          - |
            set -ex
            apk add --no-cache git python3 wabt
            npm install -g pnpm@10
            cd /src
            pnpm install --frozen-lockfile
            pnpm --filter @drawrace/engine-core build
            pnpm test:perf
        env:
          - name: CI
            value: "true"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

    - name: docker-buildx
      inputs:
        parameters:
          - name: image
          - name: dockerfile
          - name: version-path
        artifacts:
          - name: src
            path: /src
      container:
        image: docker:latest
        command: [sh, -c]
        args:
          - |
            set -ex
            cd /src
            # Tag images with the crate's semver (Rule 8: no :latest/sha pins in manifests).
            TAG=$(grep -m1 '^version' "{{inputs.parameters.version-path}}" | sed -E 's/.*"([^"]+)".*/\1/')
            case "$TAG" in
              [0-9]*.[0-9]*.[0-9]*) : ;;
              *) echo "version-path {{inputs.parameters.version-path}} did not yield a semver: '$TAG'" >&2; exit 1 ;;
            esac
            echo "Building {{inputs.parameters.image}}:$TAG"
            docker buildx build --push --platform linux/amd64 -f {{inputs.parameters.dockerfile}} -t {{inputs.parameters.image}}:$TAG -t {{inputs.parameters.image}}:latest .
            echo "$TAG" > /tmp/image-tag
        volumeMounts:
          - name: out
            mountPath: /tmp
        env:
          - name: DOCKER_HOST
            value: tcp://docker-dind:2376
          - name: DOCKER_TLS_CERTDIR
            value: /certs
          - name: DOCKER_TLS_VERIFY
            value: "1"
          - name: DOCKER_CERT_PATH
            value: /certs/client
      outputs:
        parameters:
          - name: image-tag
            valueFrom:
              path: /tmp/image-tag

    - name: update-declarative-config
      inputs:
        parameters:
          - name: images
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            set -eu
            git clone --depth 1 https://github.com/jedarden/declarative-config /tmp/dc
            cd /tmp/dc
            DIR=k8s/iad-acb/drawrace
            # Patch each deployment's image: field with the built <image>:<semver> ref.
            printf '%s\n' "{{inputs.parameters.images}}" | while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              base=${ref%:*}
              case "$base" in
                */drawrace-api)       f=$DIR/api-deployment.yaml ;;
                */drawrace-validator) f=$DIR/validator-deployment.yaml ;;
                *) echo "skip unknown image: $ref" >&2; continue ;;
              esac
              sed -i "s#image: ${base}:[^[:space:]]*#image: ${ref}#" "$f"
              echo "pinned $f -> $ref"
            done
            git config user.name "DrawRace CI"
            git config user.email "ci@drawrace.ardenone.com"
            git add -A "$DIR"
            if git diff --cached --quiet; then echo "no image changes"; exit 0; fi
            git commit -m "drawrace: pin deployment images to built semver tags"
            # declarative-config is written concurrently — rebase-retry on non-fast-forward.
            for i in 1 2 3 4 5; do
              if git push; then exit 0; fi
              git pull --rebase
            done
            echo "push failed after retries" >&2
            exit 1

    - name: wait-validator-live
      inputs:
        parameters:
          - name: health-url
          - name: timeout-seconds
            value: "600"
          - name: poll-interval-seconds
            value: "10"
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            set -ex
            url="{{inputs.parameters.health-url}}"
            deadline=$(( $(date +%s) + {{inputs.parameters.timeout-seconds}} ))
            echo "Waiting for validator to be live at $url"
            while true; do
              response=$(curl -sf "$url" || echo "{}")
              validator_ok=$(echo "$response" | jq -r '.validator.ok // false')
              if [ "$validator_ok" = "true" ]; then
                echo "Validator is live!"
                break
              fi
              if [ $(date +%s) -ge $deadline ]; then
                echo "Timeout waiting for validator"
                exit 1
              fi
              sleep {{inputs.parameters.poll-interval-seconds}}
            done

    - name: wrangler-pages
      inputs:
        parameters:
          - name: project
        artifacts:
          - name: src
            path: /src
      container:
        image: node:20-alpine
        command: [sh, -c]
        args:
          - |
            set -ex
            apk add --no-cache git
            npm install -g pnpm@10 wrangler
            cd /src
            pnpm install --frozen-lockfile
            pnpm --filter @drawrace/web build
            wrangler pages deploy apps/web/dist --project-name={{inputs.parameters.project}}
        env:
          - name: CLOUDFLARE_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: drawrace-cloudflare
                key: api-token
